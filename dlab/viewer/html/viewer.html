<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dlab session viewer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root {
  --bg-primary: #0F1117;
  --bg-secondary: #161922;
  --bg-tertiary: #1C1F2E;
  --bg-elevated: #232738;
  --border-subtle: #232738;
  --border-default: #2E3348;
  --border-emphasis: #3D4260;
  --text-primary: #EDEDEF;
  --text-secondary: #8B8FA3;
  --text-tertiary: #565B73;
  --node-session: #6C72FF;
  --node-todo: #36B5A0;
  --node-thinking: #565B73;
  --node-parallel: #D4A0FF;
  --node-error: #E8585A;
  --node-complete: #36B5A0;
  --node-active: #F0C246;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#header { display: flex; align-items: baseline; gap: 14px; padding: 10px 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-default); flex-shrink: 0; }
#header .logo { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--node-session); letter-spacing: -0.3px; }
#header .sep { color: var(--text-tertiary); position: relative; top: -1px; }
#header .dpack-name { font-weight: 500; font-size: 13px; position: relative; top: -1px; }
.hdr-stat { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); position: relative; top: -1px; }
.hdr-stat .val { color: var(--text-secondary); }

#main { display: flex; flex: 1; overflow: hidden; }

#tree-panel { flex: 1; overflow: auto; cursor: grab; }
#tree-panel:active { cursor: grabbing; }
#tree-panel svg { display: block; }
.link { fill: none; stroke: var(--border-default); stroke-width: 1.2; }
.link-parallel { stroke: var(--node-parallel); opacity: 0.4; }
.node { cursor: pointer; }
.node:hover .node-bg { filter: brightness(1.2); }
.node.selected .node-bg { stroke-width: 2; stroke: var(--text-primary) !important; }
.node-bg { transition: filter 0.12s; }
.node-label { font-family: var(--font-sans); fill: var(--text-primary); pointer-events: none; }
.node-sublabel { font-family: var(--font-mono); fill: var(--text-tertiary); pointer-events: none; }

#detail-panel { width: 380px; min-width: 380px; border-left: 1px solid var(--border-default); background: var(--bg-secondary); display: flex; flex-direction: column; overflow: hidden; }
#detail-header { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); min-height: 44px; display: flex; align-items: center; gap: 8px; }
#detail-header .node-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
#detail-header .node-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
#detail-content { flex: 1; overflow-y: auto; }
#detail-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-tertiary); font-size: 12px; }

.step-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; transition: background 0.1s; }
.step-item:hover { background: var(--bg-tertiary); }
.step-item.expanded { background: var(--bg-tertiary); }
.step-icon { width: 18px; height: 18px; border-radius: 4px; display: grid; place-items: center; font-family: var(--font-mono); font-size: 9px; font-weight: 700; flex-shrink: 0; line-height: 1; }
.step-icon.tool { background: rgba(108,114,255,0.15); color: var(--node-session); }
.step-icon.text { background: rgba(139,143,163,0.1); color: var(--text-tertiary); }
.step-icon.error { background: rgba(232,88,90,0.15); color: var(--node-error); }
.step-icon.raw { background: rgba(86,91,115,0.1); color: var(--text-tertiary); }
.step-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.4; flex: 1; }
.step-summary.mono { font-family: var(--font-mono); font-size: 11px; }
.step-summary .tool-name { color: var(--text-primary); font-family: var(--font-mono); font-size: 11px; }
.step-detail { margin: 6px 0 4px 26px; padding: 8px 10px; background: var(--bg-elevated); border-radius: 4px; font-family: var(--font-mono); font-size: 11px; line-height: 1.5; color: var(--text-secondary); white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow-y: auto; }
.step-detail.error-detail { border-left: 2px solid var(--node-error); }

.info-row { display: flex; justify-content: space-between; padding: 8px 16px; font-size: 12px; border-bottom: 1px solid var(--border-subtle); }
.info-label { color: var(--text-tertiary); }
.info-value { color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; }

/* Artifacts overlay */
#artifact-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; }
#artifact-overlay.visible { display: flex; }
#artifact-modal { margin: 40px auto; width: 90%; max-width: 900px; max-height: calc(100vh - 80px); background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
#artifact-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); }
#artifact-modal-header h3 { font-size: 14px; font-weight: 500; }
#artifact-modal-close { background: none; border: none; color: var(--text-tertiary); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
#artifact-modal-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }
#artifact-modal-body { display: flex; flex: 1; overflow: hidden; }
#artifact-list { width: 220px; min-width: 220px; border-right: 1px solid var(--border-subtle); overflow-y: auto; padding: 8px 0; }
.artifact-item { display: flex; align-items: center; gap: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-family: var(--font-mono); color: var(--text-secondary); transition: background 0.1s; }
.artifact-item:hover { background: var(--bg-tertiary); }
.artifact-item.active { background: var(--bg-tertiary); border-left: 2px solid var(--node-session); color: var(--text-primary); }
#artifact-viewer { flex: 1; overflow: auto; padding: 16px; }
#artifact-viewer pre { font-family: var(--font-mono); font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: var(--text-secondary); }
#artifact-viewer img { max-width: 100%; border-radius: 6px; }
#artifact-viewer table { border-collapse: collapse; font-family: var(--font-mono); font-size: 11px; width: 100%; }
#artifact-viewer th, #artifact-viewer td { border: 1px solid var(--border-default); padding: 4px 8px; text-align: left; }
#artifact-viewer th { background: var(--bg-tertiary); color: var(--text-tertiary); font-weight: 600; }
#artifact-viewer .md { color: var(--text-primary); line-height: 1.7; font-size: 13px; }
#artifact-viewer .md h1 { font-size: 20px; margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border-default); }
#artifact-viewer .md h2 { font-size: 16px; margin: 16px 0 6px; }
#artifact-viewer .md h3 { font-size: 14px; margin: 12px 0 4px; }
#artifact-viewer .md p { margin: 8px 0; }
#artifact-viewer .md ul, #artifact-viewer .md ol { margin: 8px 0; padding-left: 24px; }
#artifact-viewer .md li { margin: 4px 0; }
#artifact-viewer .md code { font-family: var(--font-mono); background: var(--bg-elevated); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
#artifact-viewer .md pre { background: var(--bg-elevated); border-radius: 6px; padding: 12px; margin: 8px 0; overflow-x: auto; }
#artifact-viewer .md pre code { padding: 0; background: none; }
#artifact-viewer .md strong { color: var(--text-primary); }
#artifact-viewer .md blockquote { border-left: 3px solid var(--border-emphasis); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
#artifact-viewer .md a { color: #6C72FF; }
#artifact-viewer .md table { border-collapse: collapse; margin: 8px 0; width: 100%; }
#artifact-viewer .md th, #artifact-viewer .md td { border: 1px solid var(--border-default); padding: 6px 10px; font-size: 12px; }
#artifact-viewer .md th { background: var(--bg-tertiary); }
.artifacts-btn { background: rgba(108,114,255,0.1); border: 1px solid rgba(108,114,255,0.3); border-radius: 6px; color: #6C72FF; font-size: 12px; padding: 6px 14px; cursor: pointer; font-family: var(--font-sans); font-weight: 500; margin-top: 4px; transition: all 0.15s; }
.artifacts-btn:hover { background: rgba(108,114,255,0.2); border-color: rgba(108,114,255,0.5); color: #8085FF; }
</style>
</head>
<body>

<div id="header">
  <span class="logo">decision-lab</span>
  <span class="sep">/</span>
  <span class="dpack-name" id="dpack-name">loading...</span>
  <span class="hdr-stat"><span class="val" id="stat-duration">--</span></span>
  <span class="hdr-stat"><span class="val" id="stat-cost">--</span></span>
</div>

<div id="artifact-overlay" onclick="if(event.target===this)closeArtifacts()">
  <div id="artifact-modal">
    <div id="artifact-modal-header"><h3>Artifacts</h3><button id="artifact-modal-close" onclick="closeArtifacts()">&times;</button></div>
    <div id="artifact-modal-body"><div id="artifact-list"></div><div id="artifact-viewer"></div></div>
  </div>
</div>

<div id="main">
  <div id="tree-panel"></div>
  <div id="detail-panel">
    <div id="detail-header"><span id="detail-placeholder">Click a node to view details</span></div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
let treeData = null;
let sessionMeta = null;
let selectedNode = null;
let artifactsData = [];

const NODE_CONFIGS = {
  session:  { w: 200, h: 40, rx: 20, fill: '#0F1117', stroke: '#6C72FF', strokeW: 1.5 },
  todo:     { w: 250, h: 40, rx: 6,  fill: '#0F1117', stroke: '#36B5A0', strokeW: 1 },
  thinking: { w: 160, h: 28, rx: 4,  fill: '#161922', stroke: '#2E3348', strokeW: 1 },
  parallel: { w: 180, h: 32, rx: 6,  fill: '#0F1117', stroke: '#D4A0FF', strokeW: 1 },
};

async function init() {
  const res = await fetch('/api/session');
  const data = await res.json();
  treeData = data.layout;
  sessionMeta = data.session.meta;
  artifactsData = data.session.artifacts || [];
  renderHeader();
  renderTree();
}

function renderHeader() {
  document.getElementById('dpack-name').textContent = sessionMeta.dpack_name || 'session';
  document.title = `dlab / ${sessionMeta.dpack_name || 'session'}`;
  document.getElementById('stat-duration').textContent = fmtDuration(sessionMeta.total_duration_ms);
  document.getElementById('stat-cost').textContent = fmtCost(sessionMeta.total_cost);
}

function renderTree() {
  const panel = document.getElementById('tree-panel');
  const root = d3.hierarchy(treeData, d => d.children);

  // Compute tree layout
  const dx = 43;  // vertical spacing between nodes
  const dy = 260; // horizontal: must exceed widest node (220px) + gap
  const tree = d3.tree()
    .nodeSize([dx, dy])
    .separation((a, b) => a.parent === b.parent ? 1 : 1.2);
  tree(root);

  // Compute bounds
  let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
  root.each(d => {
    const cfg = NODE_CONFIGS[d.data.type] || NODE_CONFIGS.thinking;
    x0 = Math.min(x0, d.x - cfg.h / 2);
    x1 = Math.max(x1, d.x + cfg.h / 2);
    y0 = Math.min(y0, d.y - cfg.w / 2);
    y1 = Math.max(y1, d.y + cfg.w / 2);
  });

  const pad = 40;
  const width = y1 - y0 + pad * 2;
  const height = x1 - x0 + pad * 2;

  const svg = d3.select(panel).append('svg')
    .attr('width', width)
    .attr('height', height)
    .append('g')
    .attr('transform', `translate(${-y0 + pad},${-x0 + pad})`);

  // Links — offset to pill edges (outgoing: right side, incoming: left side)
  svg.selectAll('.link')
    .data(root.links())
    .join('path')
    .attr('class', d => {
      if (d.source.data.type === 'parallel' || d.target.data.type === 'session') return 'link link-parallel';
      return 'link';
    })
    .attr('d', d => {
      const srcCfg = NODE_CONFIGS[d.source.data.type] || NODE_CONFIGS.thinking;
      const tgtCfg = NODE_CONFIGS[d.target.data.type] || NODE_CONFIGS.thinking;
      const maxW = NODE_CONFIGS.todo.w;           // widest pill
      const srcOutFactor = d.source.data.type === 'parallel' ? 0.4 : 0.3;
      const sy = d.source.y + srcCfg.w * srcOutFactor;  // outgoing: right side
      const isInstance = d.target.data.type === 'session';
      const fromTodo = d.source.data.type === 'todo';
      const incomingW = isInstance ? tgtCfg.w : (fromTodo ? NODE_CONFIGS.parallel.w : maxW);
      const ty = d.target.y - incomingW * 0.5;
      const sx = d.source.x;
      const tx = d.target.x;
      const srcCy = d.source.y;  // source center
      const tgtCy = d.target.y;  // target center
      // source center → source right → curve → target left edge → target center
      return `M${srcCy},${sx} L${sy},${sx} C${(sy+ty)/2},${sx} ${(sy+ty)/2},${tx} ${ty},${tx} L${tgtCy},${tx}`;
    });

  // Nodes
  const node = svg.selectAll('.node')
    .data(root.descendants())
    .join('g')
    .attr('class', 'node')
    .attr('transform', d => `translate(${d.y},${d.x})`)
    .on('click', (ev, d) => selectNode(d));

  // Node backgrounds + labels
  node.each(function(d) {
    const g = d3.select(this);
    const cfg = NODE_CONFIGS[d.data.type] || NODE_CONFIGS.parallel;
    let fill = cfg.fill;
    let stroke = cfg.stroke;
    if (d.data.has_error) { stroke = '#E8585A'; fill = '#1a0f0f'; }

    g.append('rect')
      .attr('class', 'node-bg')
      .attr('x', -cfg.w / 2).attr('y', -cfg.h / 2)
      .attr('width', cfg.w).attr('height', cfg.h)
      .attr('rx', cfg.rx)
      .attr('fill', fill).attr('stroke', stroke).attr('stroke-width', cfg.strokeW);

    const type = d.data.type;
    if (type === 'session') {
      const name = d.data.name || 'agent';
      const model = d.data.model ? d.data.model.split('/').pop() : '';
      g.append('text').attr('class', 'node-label')
        .attr('text-anchor', 'middle').attr('dy', model ? '-3' : '4')
        .attr('font-size', '11px').text(truncate(name, 26));
      if (model) {
        g.append('text').attr('class', 'node-sublabel')
          .attr('text-anchor', 'middle').attr('dy', '11')
          .attr('font-size', '9px').text(truncate(model, 28));
      }
    } else if (type === 'todo') {
      const label = d.data.name || '';
      const fo = g.append('foreignObject')
        .attr('x', -cfg.w / 2).attr('y', -cfg.h / 2)
        .attr('width', cfg.w).attr('height', cfg.h);
      fo.append('xhtml:div')
        .style('font-size', '11px').style('line-height', '1.3')
        .style('color', '#EDEDEF').style('overflow', 'hidden')
        .style('font-family', 'var(--font-sans)')
        .style('padding', '0 14px')
        .style('height', '100%')
        .style('display', 'flex').style('align-items', 'center')
        .text(label);
    } else if (type === 'parallel') {
      g.append('text').attr('class', 'node-label')
        .attr('text-anchor', 'middle').attr('dy', '4')
        .attr('font-size', '10px').attr('fill', '#D4A0FF')
        .text(d.data.name || 'parallel');
    } else if (type === 'thinking') {
      g.append('text').attr('class', 'node-label')
        .attr('text-anchor', 'middle').attr('dy', '4')
        .attr('font-size', '10px').attr('fill', d.data.has_error ? '#E8585A' : '#8B8FA3')
        .text(d.data.name || 'working');
    }
  });
}

function selectNode(d) {
  selectedNode = d;
  d3.selectAll('.node').classed('selected', false);
  d3.selectAll('.node').filter(n => n === d).classed('selected', true);

  const hdr = document.getElementById('detail-header');
  const content = document.getElementById('detail-content');
  const type = d.data.type;
  const typeColors = { session: '#6C72FF', todo: '#36B5A0', thinking: '#8B8FA3', parallel: '#D4A0FF' };
  const typeLabels = { session: 'session', todo: 'todo', thinking: 'working', parallel: 'parallel' };
  const color = d.data.has_error ? '#E8585A' : (typeColors[type] || '#8B8FA3');

  const displayType = typeLabels[type] || type;
  hdr.innerHTML = `<span class="node-type" style="background:${color}22;color:${color}">${displayType}</span>` +
    `<span class="node-title">${esc(d.data.name || '')}</span>`;

  let html = '';

  if (type === 'session') {
    if (d.data.model) html += infoRow('Model', d.data.model);
    html += infoRow('Status', d.data.is_complete ? 'Complete' : 'Running');
    if (d.data.total_cost) html += infoRow('Cost', fmtCost(d.data.total_cost));
  } else if (type === 'todo') {
    if (d.data.status) html += infoRow('Status', d.data.status);
  } else if (type === 'parallel') {
    html += infoRow('Agent', d.data.name);
    const nChildren = (d.data.children || []).length;
    html += infoRow('Instances', nChildren);
  }

  // Artifacts button (from nearest session ancestor)
  const sessionInfo = findSessionArtifacts(d);
  if (sessionInfo.artifacts.length > 0) {
    artifactsData = sessionInfo.artifacts;
    const sn = sessionInfo.name || '';
    html += `<div style="padding:8px 16px"><button class="artifacts-btn" onclick="openArtifacts('${esc(sn)}')">View ${sessionInfo.artifacts.length} session artifacts</button></div>`;
  }

  // Prompt (session nodes only)
  if (type === 'session' && d.data.prompt) {
    html += '<div style="padding:8px 16px;color:var(--text-tertiary);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px">Prompt</div>';
    html += `<div style="padding:0 16px"><div style="background:var(--bg-elevated);border-radius:4px;padding:10px 12px;font-family:var(--font-mono);font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-word;color:var(--text-secondary);max-height:450px;overflow-y:auto">${esc(d.data.prompt)}</div></div>`;
  }

  // Steps (for thinking and parallel nodes)
  const steps = d.data.steps || [];
  if (steps.length > 0) {
    html += '<div style="padding:8px 16px;color:var(--text-tertiary);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px">Event stream</div>';
    for (let i = 0; i < steps.length; i++) {
      html += renderStepItem(steps[i], i);
    }
  }

  content.innerHTML = html;

  // Attach expand listeners
  content.querySelectorAll('.step-item').forEach(el => {
    el.addEventListener('click', () => {
      el.classList.toggle('expanded');
      const detail = el.querySelector('.step-detail');
      if (detail) detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
    });
  });
}

function renderStepItem(step, idx) {
  const type = step.type;
  const iconClass = type === 'error' ? 'error' : type === 'tool' || type === 'parallel-agents' ? 'tool' : type === 'raw' ? 'raw' : 'text';
  const icons = { tool: 'T', text: '\u2261', error: '!', raw: '\u00b7', 'parallel-agents': 'P' };
  const icon = icons[type] || '\u00b7';

  // Mono class for tool and raw steps
  const isMono = type === 'tool' || type === 'parallel-agents' || type === 'raw';
  let summary = '';
  if (type === 'tool' || type === 'parallel-agents') {
    summary = `<span class="tool-name">${esc(step.tool || '')}</span> ${esc(step.summary.replace(step.tool + ': ', '') || '')}`;
  } else {
    summary = esc(step.summary || '');
  }

  // Expandable detail
  let detail = '';
  const raw = step.raw || {};
  const part = raw.part || {};
  const state = part.state || {};

  if (type === 'error') {
    const err = raw.error || part.error || {};
    const msg = typeof err === 'object' ? (err.data?.message || err.name || JSON.stringify(err, null, 2)) : String(err);
    detail = `<div class="step-detail error-detail" style="display:none">${esc(msg)}</div>`;
  } else if (type === 'tool' || type === 'parallel-agents') {
    let parts = [];
    if (state.input) parts.push('INPUT:\n' + (typeof state.input === 'object' ? JSON.stringify(state.input, null, 2) : String(state.input)));
    if (state.output) parts.push('OUTPUT:\n' + String(state.output));
    if (state.error) parts.push('ERROR:\n' + String(state.error));
    if (parts.length) detail = `<div class="step-detail" style="display:none">${esc(parts.join('\n\n'))}</div>`;
  } else if (type === 'text' || type === 'raw') {
    const text = part.text || '';
    if (text.length > 60) detail = `<div class="step-detail" style="display:none">${esc(text)}</div>`;
  }

  return `<div class="step-item"><span class="step-icon ${iconClass}">${icon}</span><div class="step-summary${isMono ? ' mono' : ''}">${summary}${detail}</div></div>`;
}

function infoRow(label, value) {
  return `<div class="info-row"><span class="info-label">${esc(label)}</span><span class="info-value">${esc(String(value))}</span></div>`;
}

function fmtCost(c) {
  if (!c || c <= 0) return '';
  return '$' + c.toFixed(2);
}
function fmtDuration(ms) {
  if (!ms || ms <= 0) return '';
  const s = ms / 1000;
  if (s < 60) return s.toFixed(0) + 's';
  const m = Math.floor(s / 60);
  const rs = Math.round(s % 60);
  if (m >= 60) {
    const h = Math.floor(m / 60);
    const rm = m % 60;
    if (rs) return h + 'h' + rm + 'm' + rs + 's';
    if (rm) return h + 'h' + rm + 'm';
    return h + 'h';
  }
  return rs ? m + 'm' + rs + 's' : m + 'm';
}
function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '\u2026' : s; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

function findSessionArtifacts(d) {
  // Walk up the d3 hierarchy to find the nearest session ancestor
  let node = d;
  while (node) {
    if (node.data.type === 'session' && node.data.artifacts && node.data.artifacts.length > 0) {
      return { artifacts: node.data.artifacts, name: node.data.name };
    }
    node = node.parent;
  }
  return { artifacts: [], name: null };
}

// Artifacts overlay
function openArtifacts(sessionName) {
  const overlay = document.getElementById('artifact-overlay');
  overlay.classList.add('visible');
  const title = document.querySelector('#artifact-modal-header h3');
  title.textContent = sessionName ? `Artifacts — ${sessionName}` : 'Artifacts';
  const list = document.getElementById('artifact-list');
  list.innerHTML = artifactsData.map((a, i) =>
    `<div class="artifact-item" onclick="loadArtifact(${i})" data-idx="${i}">${esc(a.name)}</div>`
  ).join('');
  document.getElementById('artifact-viewer').innerHTML = '<div style="color:var(--text-tertiary);padding:20px">Select a file to view</div>';
  if (artifactsData.length > 0) loadArtifact(0);
}
function closeArtifacts() {
  document.getElementById('artifact-overlay').classList.remove('visible');
}
async function loadArtifact(idx) {
  const a = artifactsData[idx];
  document.querySelectorAll('.artifact-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.artifact-item[data-idx="${idx}"]`);
  if (el) el.classList.add('active');
  const viewer = document.getElementById('artifact-viewer');
  if (a.type === 'image') {
    viewer.innerHTML = `<img src="/api/file/${a.path.split('/').map(encodeURIComponent).join('/')}"/>`;
    return;
  }
  try {
    const res = await fetch(`/api/file/${a.path.split('/').map(encodeURIComponent).join('/')}`);
    const text = await res.text();
    if (a.type === 'md') {
      marked.setOptions({ breaks: true, gfm: true });
      viewer.innerHTML = `<div class="md">${marked.parse(text)}</div>`;
      // Highlight code blocks inside markdown
      viewer.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    } else if (a.type === 'py') {
      viewer.innerHTML = `<pre><code class="language-python">${esc(text)}</code></pre>`;
      viewer.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    } else if (a.type === 'csv') {
      const lines = text.trim().split('\n');
      let h = '<table>';
      for (let i = 0; i < Math.min(lines.length, 200); i++) {
        const cells = lines[i].split(',');
        const tag = i === 0 ? 'th' : 'td';
        h += '<tr>' + cells.map(c => `<${tag}>${esc(c)}</${tag}>`).join('') + '</tr>';
      }
      viewer.innerHTML = h + '</table>';
    } else {
      viewer.innerHTML = `<pre>${esc(text)}</pre>`;
    }
  } catch (e) {
    viewer.innerHTML = `<pre style="color:var(--node-error)">Error: ${esc(e.message)}</pre>`;
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeArtifacts(); });

init();
</script>
</body>
