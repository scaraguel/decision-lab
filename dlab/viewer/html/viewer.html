<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dlab session viewer</title>
<style>
/* Catppuccin Mocha palette — https://catppuccin.com/palette */
:root {
  --ctp-base: #1e1e2e;
  --ctp-mantle: #181825;
  --ctp-crust: #11111b;
  --ctp-surface0: #313244;
  --ctp-surface1: #45475a;
  --ctp-surface2: #585b70;
  --ctp-overlay0: #6c7086;
  --ctp-overlay1: #7f849c;
  --ctp-overlay2: #9399b2;
  --ctp-subtext0: #a6adc8;
  --ctp-subtext1: #bac2de;
  --ctp-text: #cdd6f4;
  --ctp-lavender: #b4befe;
  --ctp-blue: #89b4fa;
  --ctp-sapphire: #74c7ec;
  --ctp-sky: #89dceb;
  --ctp-teal: #94e2d5;
  --ctp-green: #a6e3a1;
  --ctp-yellow: #f9e2af;
  --ctp-peach: #fab387;
  --ctp-maroon: #eba0ac;
  --ctp-red: #f38ba8;
  --ctp-mauve: #cba6f7;
  --ctp-pink: #f5c2e7;
  --ctp-flamingo: #f2cdcd;
  --ctp-rosewater: #f5e0dc;

  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--ctp-base);
  color: var(--ctp-text);
  font-family: var(--font-sans);
  font-size: 14px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
#header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: var(--ctp-mantle);
  border-bottom: 1px solid var(--ctp-surface0);
  flex-shrink: 0;
}
#header .logo { font-family: var(--font-mono); font-size: 15px; font-weight: 600; color: var(--ctp-peach); }
#header .sep { color: var(--ctp-surface2); }
#header .dpack-name { font-weight: 600; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-completed { background: rgba(166,227,161,0.12); color: var(--ctp-green); }
.badge-error { background: rgba(243,139,168,0.12); color: var(--ctp-red); }
.badge-running { background: rgba(249,226,175,0.12); color: var(--ctp-yellow); }
.badge-unknown { background: rgba(147,153,178,0.12); color: var(--ctp-overlay2); }
.stat { font-family: var(--font-mono); font-size: 12px; color: var(--ctp-overlay2); }
.stat .val { color: var(--ctp-text); font-weight: 600; }

/* Main layout */
#main { display: flex; flex: 1; overflow: hidden; }

/* Tree panel */
#tree-panel { flex: 1; overflow: auto; padding: 0; }
#tree-svg { display: block; }

/* Detail panel */
#detail-panel {
  width: 400px; min-width: 400px;
  border-left: 1px solid var(--ctp-surface0);
  background: var(--ctp-mantle);
  display: flex; flex-direction: column; overflow: hidden;
}
#detail-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--ctp-surface0);
  font-weight: 600; font-size: 13px;
}
#detail-header .step-type { color: var(--ctp-sapphire); }
#detail-header .step-tool { color: var(--ctp-peach); font-family: var(--font-mono); font-size: 12px; }
#detail-content { flex: 1; overflow-y: auto; padding: 16px; }
#detail-placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--ctp-overlay0); font-size: 13px;
}
#detail-content pre {
  font-family: var(--font-mono); font-size: 12px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word; color: var(--ctp-subtext1);
}
#detail-content .section-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--ctp-overlay1); margin: 12px 0 4px; font-weight: 600;
}
#detail-content .section-label:first-child { margin-top: 0; }
#detail-content .detail-value {
  background: var(--ctp-surface0); border-radius: 6px; padding: 10px 12px;
  font-family: var(--font-mono); font-size: 12px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word; color: var(--ctp-text);
  max-height: 300px; overflow-y: auto; margin-bottom: 8px;
}
#detail-content .detail-value.error { border-left: 3px solid var(--ctp-red); }

/* SVG styles */
.phase-header-rect {
  cursor: default;
  transition: filter 0.15s;
}
.phase-header-rect:hover { filter: brightness(1.15); }
.phase-header-label {
  font-family: var(--font-sans); font-size: 11px; font-weight: 600;
  pointer-events: none;
}
.phase-status-icon {
  font-size: 11px; pointer-events: none;
}
.step-rect {
  cursor: pointer;
  transition: filter 0.12s, stroke-width 0.12s;
}
.step-rect:hover { filter: brightness(1.25); }
.step-group.selected .step-rect { stroke-width: 2; stroke: var(--ctp-lavender); }
.step-label {
  font-family: var(--font-mono); font-size: 10px;
  pointer-events: none;
}
.edge-line {
  fill: none; stroke-width: 1.5; opacity: 0.5;
}
.edge-line.spawn { stroke: var(--ctp-blue); }
.edge-line.consolidate { stroke: var(--ctp-mauve); }
.phase-connector {
  stroke: var(--ctp-surface2); stroke-width: 1; stroke-dasharray: 4,3; opacity: 0.4;
}
</style>
</head>
<body>

<div id="header">
  <span class="logo">dlab</span>
  <span class="sep">/</span>
  <span class="dpack-name" id="dpack-name">loading...</span>
  <span class="badge badge-unknown" id="status-badge">...</span>
  <span class="stat"><span class="val" id="stat-duration">--</span> duration</span>
  <span class="stat"><span class="val" id="stat-cost">--</span> cost</span>
</div>

<div id="main">
  <div id="tree-panel">
    <svg id="tree-svg"></svg>
  </div>
  <div id="detail-panel">
    <div id="detail-header">
      <span id="detail-placeholder">Click a step to view details</span>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
let layoutData = null;
let sessionData = null;
let selectedStepId = null;

// Color mapping for step types (Catppuccin Mocha)
const STEP_COLORS = {
  'text':            { fill: '#313244', stroke: '#585b70', text: '#bac2de' },
  'tool':            { fill: '#1e3a4a', stroke: '#74c7ec', text: '#74c7ec' },
  'error':           { fill: '#3e1a28', stroke: '#f38ba8', text: '#f38ba8' },
  'raw':             { fill: '#2a2a3a', stroke: '#45475a', text: '#7f849c' },
  'parallel-agents': { fill: '#2a1e4a', stroke: '#cba6f7', text: '#cba6f7' },
};
const PHASE_FILL = '#181825';
const PHASE_STROKE = '#45475a';
const PHASE_COMPLETE_ACCENT = '#a6e3a1';
const PHASE_ACTIVE_ACCENT = '#f9e2af';

async function init() {
  try {
    const res = await fetch('/api/session');
    const data = await res.json();
    sessionData = data.session;
    layoutData = data.layout;
    renderHeader();
    renderTree();
  } catch (err) {
    document.getElementById('dpack-name').textContent = 'Error loading session';
    console.error(err);
  }
}

function renderHeader() {
  const m = sessionData.meta;
  document.getElementById('dpack-name').textContent = m.dpack_name || 'session';
  document.title = `dlab / ${m.dpack_name || 'session'}`;
  const badge = document.getElementById('status-badge');
  badge.textContent = m.status || 'unknown';
  badge.className = 'badge badge-' + (m.status || 'unknown');
  document.getElementById('stat-duration').textContent = fmtDuration(m.total_duration_ms);
  document.getElementById('stat-cost').textContent = fmtCost(m.total_cost);
}

function renderTree() {
  const svg = document.getElementById('tree-svg');
  const cw = layoutData.canvas_width;
  const ch = layoutData.canvas_height;
  svg.setAttribute('viewBox', `0 0 ${cw} ${ch}`);
  svg.setAttribute('width', cw);
  svg.setAttribute('height', ch);

  let html = '';

  // Defs
  html += `<defs>
    <marker id="arr-spawn" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="6" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L8 3 L0 6z" fill="#89b4fa" opacity="0.5"/>
    </marker>
    <marker id="arr-cons" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="6" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L8 3 L0 6z" fill="#cba6f7" opacity="0.5"/>
    </marker>
  </defs>`;

  // Edges first (behind nodes)
  for (const edge of layoutData.edges) {
    const src = layoutData.nodes.find(n => n.id === edge.source_id);
    const tgt = layoutData.nodes.find(n => n.id === edge.target_id);
    if (!src || !tgt) continue;

    const sx = src.x + src.width / 2;
    const sy = src.y + src.height;
    const tx = tgt.x + tgt.width / 2;
    const ty = tgt.y;
    const my = (sy + ty) / 2;
    const marker = edge.type === 'consolidate' ? 'url(#arr-cons)' : 'url(#arr-spawn)';
    html += `<path class="edge-line ${edge.type}" d="M${sx} ${sy} C${sx} ${my} ${tx} ${my} ${tx} ${ty}" marker-end="${marker}"/>`;
  }

  // Nodes
  for (const node of layoutData.nodes) {
    if (node.type === 'phase-header') {
      html += renderPhaseHeader(node);
    } else {
      html += renderStepNode(node);
    }
  }

  svg.innerHTML = html;
}

function renderPhaseHeader(node) {
  const isComplete = node.status === 'completed' || node.status === 'in_progress';
  const accent = node.status === 'completed' ? PHASE_COMPLETE_ACCENT
    : node.status === 'in_progress' ? PHASE_ACTIVE_ACCENT
    : PHASE_STROKE;

  // Truncate label
  let label = node.label || '';
  if (label.length > 24) label = label.slice(0, 22) + '...';

  // Status icon
  const icon = node.status === 'completed' ? '\u2713'
    : node.status === 'in_progress' ? '\u25cb'
    : '';

  let h = '';
  h += `<g>`;
  h += `<rect class="phase-header-rect" x="${node.x}" y="${node.y}" width="${node.width}" height="${node.height}" rx="8" fill="${PHASE_FILL}" stroke="${accent}" stroke-width="1.5"/>`;
  // Status icon
  if (icon) {
    h += `<text class="phase-status-icon" x="${node.x + 10}" y="${node.y + 20}" fill="${accent}">${icon}</text>`;
  }
  // Label (wrap to 2 lines if needed)
  const lx = node.x + (icon ? 24 : 10);
  h += `<text class="phase-header-label" x="${lx}" y="${node.y + 20}" fill="${esc(getComputedStyle(document.documentElement).getPropertyValue('--ctp-text').trim()) || '#cdd6f4'}">${esc(label)}</text>`;
  // Cost
  if (node.cost > 0) {
    h += `<text class="phase-header-label" x="${node.x + 10}" y="${node.y + 36}" fill="${accent}" font-size="10" opacity="0.7">$${node.cost.toFixed(4)}</text>`;
  }
  h += `</g>`;
  return h;
}

function renderStepNode(node) {
  const colors = STEP_COLORS[node.type] || STEP_COLORS['text'];
  const fill = node.has_error ? STEP_COLORS['error'].fill : colors.fill;
  const stroke = node.has_error ? STEP_COLORS['error'].stroke : colors.stroke;
  const textColor = node.has_error ? STEP_COLORS['error'].text : colors.text;

  let label = node.label || '';
  if (label.length > 22) label = label.slice(0, 20) + '..';

  let h = '';
  h += `<g class="step-group" data-id="${esc(node.id)}" onclick="selectStep('${esc(node.id)}')">`;
  h += `<rect class="step-rect" x="${node.x}" y="${node.y}" width="${node.width}" height="${node.height}" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="1"/>`;
  h += `<text class="step-label" x="${node.x + 6}" y="${node.y + 16}" fill="${textColor}">${esc(label)}</text>`;
  h += `</g>`;
  return h;
}

// Step selection + detail panel
function selectStep(stepId) {
  selectedStepId = stepId;
  document.querySelectorAll('.step-group').forEach(g => g.classList.remove('selected'));
  const el = document.querySelector(`.step-group[data-id="${CSS.escape(stepId)}"]`);
  if (el) el.classList.add('selected');

  const node = layoutData.nodes.find(n => n.id === stepId);
  if (!node || !node.raw) {
    document.getElementById('detail-header').innerHTML = '<span id="detail-placeholder">No detail available</span>';
    document.getElementById('detail-content').innerHTML = '';
    return;
  }

  renderDetail(node);
}

function renderDetail(node) {
  const hdr = document.getElementById('detail-header');
  const typeBadge = node.type === 'error' ? '<span style="color:var(--ctp-red)">error</span>'
    : node.type === 'parallel-agents' ? '<span style="color:var(--ctp-mauve)">parallel</span>'
    : `<span class="step-type">${esc(node.type)}</span>`;
  const toolStr = node.tool ? ` <span class="step-tool">${esc(node.tool)}</span>` : '';
  hdr.innerHTML = typeBadge + toolStr;

  const raw = node.raw || {};
  const part = raw.part || {};
  const state = part.state || {};
  let content = '';

  // Duration
  if (node.duration_ms) {
    content += `<div class="section-label">Duration</div><div class="detail-value">${fmtDuration(node.duration_ms)}</div>`;
  }

  if (node.type === 'text' || node.type === 'raw') {
    const text = part.text || '';
    content += `<div class="section-label">Content</div><div class="detail-value">${esc(text)}</div>`;
  } else if (node.type === 'error') {
    const err = raw.error || part.error || {};
    const errMsg = typeof err === 'object' ? (err.data?.message || err.name || JSON.stringify(err, null, 2)) : String(err);
    content += `<div class="section-label">Error</div><div class="detail-value error">${esc(errMsg)}</div>`;
  } else if (node.type === 'tool' || node.type === 'parallel-agents') {
    // Input
    const input = state.input;
    if (input) {
      const inputStr = typeof input === 'object' ? JSON.stringify(input, null, 2) : String(input);
      content += `<div class="section-label">Input</div><div class="detail-value">${esc(inputStr)}</div>`;
    }
    // Output
    const output = state.output;
    if (output) {
      const outputStr = typeof output === 'string' ? output : JSON.stringify(output, null, 2);
      content += `<div class="section-label">Output</div><div class="detail-value">${esc(outputStr)}</div>`;
    }
    // Error
    const error = state.error;
    if (error) {
      content += `<div class="section-label">Error</div><div class="detail-value error">${esc(String(error))}</div>`;
    }
  }

  document.getElementById('detail-content').innerHTML = content;
}

// Helpers
function fmtDuration(ms) {
  if (!ms || ms <= 0) return '--';
  const s = ms / 1000;
  if (s < 60) return s.toFixed(1) + 's';
  const m = Math.floor(s / 60);
  const rs = Math.round(s % 60);
  if (rs === 0) return m + 'm';
  return m + 'm' + rs + 's';
}
function fmtCost(c) {
  if (!c || c <= 0) return '--';
  return c < 0.01 ? '$' + c.toFixed(4) : '$' + c.toFixed(2);
}
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>
